name: release

# Publishes to PyPI when a version tag is pushed:
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# Uses PyPI trusted publishing (OIDC) — no API token stored in the repo.
# One-time setup on pypi.org: project "drangue" -> Publishing -> add
# GitHub publisher (owner: om-er, repo: drangue, workflow: release.yml,
# environment: pypi).

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Tag must match pyproject version
        # Tagging v0.2.0 while pyproject still says 0.1.0 would publish a
        # wheel that installs as the wrong version. Refuse the mismatch.
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          if [ "$tag" != "$version" ]; then
            echo "::error::tag v$tag does not match pyproject.toml version $version"
            exit 1
          fi
      - run: pip install -e .
      - run: python run_tests.py
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
