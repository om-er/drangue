name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # The core's promise is zero runtime dependencies. This job holds it to
  # that: no extras, no SDKs, just the package and its tests.
  zero-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - run: python run_tests.py
      - run: python extensions/run_tests.py

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: python run_tests.py
      - run: python extensions/run_tests.py

  # The extensions' own claims are only real if CI installs their SDKs and
  # runs their suites against real backing services.
  extensions:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: drangue
          POSTGRES_PASSWORD: drangue
          POSTGRES_DB: drangue
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U drangue"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DRANGUE_POSTGRES_DSN: postgresql://drangue:drangue@localhost:5432/drangue
      DRANGUE_TEMPORAL_TEST: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - run: pip install "psycopg[binary]>=3.1" "temporalio>=1.5" "mcp>=1.0"
      - run: python extensions/run_tests.py

  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      # The offline demos are executable documentation; keep them green.
      - run: PYTHONPATH=.:examples/sre python examples/sre/offline_demo.py
      - run: PYTHONPATH=.:examples/refunds python examples/refunds/offline_demo.py

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*

  # Contributions are accepted under MIT with a DCO sign-off (CONTRIBUTING.md).
  dco:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Every PR commit carries a Signed-off-by trailer
        run: |
          fail=0
          for c in $(git rev-list ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}); do
            if ! git show -s --format=%B "$c" | grep -qi '^Signed-off-by: '; then
              echo "::error::commit $c is missing Signed-off-by (use: git commit -s)"
              fail=1
            fi
          done
          exit $fail
